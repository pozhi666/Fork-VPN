<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>支付完成</title>
    <style>
      :root {
        color-scheme: light dark;
        font-family: system-ui, -apple-system, 'Segoe UI', sans-serif;
      }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #0f1419;
        color: #e7ecf3;
      }
      .card {
        max-width: 420px;
        margin: 24px;
        padding: 28px 24px;
        border-radius: 16px;
        background: #1a2332;
        border: 1px solid #2a3a52;
        text-align: center;
        box-shadow: 0 12px 40px rgba(0, 0, 0, 0.35);
      }
      h1 {
        font-size: 1.35rem;
        margin: 0 0 12px;
      }
      p {
        margin: 0;
        line-height: 1.6;
        color: #a8b3c7;
        font-size: 0.95rem;
      }
      .ok {
        font-size: 2.5rem;
        margin-bottom: 8px;
      }
    </style>
  </head>
  <body>
    <div class="card">
      <div class="ok">✓</div>
      <h1>支付处理中</h1>
      <p>
        若已完成付款，请回到客户端商城页面，系统会自动确认开通。<br />
        一般数秒内生效，也可手动点「刷新商品 / 同步节点」。
      </p>
    </div>
  </body>
</html>
